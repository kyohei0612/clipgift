<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>解析画面 - YouTubeツール</title>
    <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0e0e12;
  color: #f0f0f4;
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

body.light-mode {
  background: #f4f4f8;
  color: #1a1a24;
}

.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 32px 20px 80px;
  text-align: left;
}

/* ヘッダー */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}
.page-header h1,
h1 {
  font-size: 20px;
  font-weight: 600;
  color: #f0f0f4;
  letter-spacing: -.3px;
}
body.light-mode h1,
body.light-mode .page-header h1 { color: #1a1a24; }

#themeToggle {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  color: #8080a0;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
#themeToggle:hover { background: rgba(255,255,255,.1); color: #c0c0d8; }
body.light-mode #themeToggle {
  background: #fff;
  border-color: #ddd;
  color: #666;
}

/* セクションカード */
.section-box {
  background: #16161c;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 12px;
  padding: 20px 22px;
  margin-bottom: 10px;
  transition: border-color .2s;
}
.section-box:hover { border-color: rgba(255,255,255,.12); }
body.light-mode .section-box {
  background: #fff;
  border-color: #e4e4e0;
}

.section-title {
  font-size: 11px;
  font-weight: 600;
  color: #5a5a72;
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
body.light-mode .section-title { color: #999; }

.step-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  background: rgba(110,86,255,.2);
  color: #a99cff;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

/* ファイル選択 */
.horizontal-files {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 540px) { .horizontal-files { grid-template-columns: 1fr; } }

.file-block > label:first-child {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #5a5a72;
  margin-bottom: 10px;
}
body.light-mode .file-block > label:first-child { color: #999; }

.file-line {
  display: flex;
  align-items: center;
  gap: 10px;
}

.fileUploadBtn {
  display: inline-flex;
  align-items: center;
  background: #6e56ff;
  color: #fff;
  padding: 7px 14px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background .15s, transform .1s;
  border: none;
  user-select: none;
}
.fileUploadBtn:hover { background: #7b65ff; transform: translateY(-1px); }
.fileUploadBtn:active { transform: translateY(0); }

.file-info {
  font-size: 12px;
  color: #3e3e52;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
body.light-mode .file-info { color: #ccc; }

/* フォーム */
.form-row {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin-bottom: 16px;
}
.form-row:last-child { margin-bottom: 0; }

.form-sub {
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex: 1;
  min-width: 160px;
}
.form-sub label {
  font-size: 12px;
  font-weight: 500;
  color: #5a5a72;
}
body.light-mode .form-sub label { color: #999; }

input[type="text"], select, input[type="number"] {
  background: #0e0e12;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 7px;
  color: #c0c0d8;
  font-size: 13px;
  padding: 8px 11px;
  width: 100%;
  outline: none;
  font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
input[type="text"]:focus, select:focus {
  border-color: #6e56ff;
  box-shadow: 0 0 0 3px rgba(110,86,255,.2);
}
input[type="text"]::placeholder { color: #3e3e52; }
select { cursor: pointer; }
body.light-mode input[type="text"],
body.light-mode select,
body.light-mode input[type="number"] {
  background: #fff;
  border-color: #ddd;
  color: #1a1a24;
}

/* ボタン類 */
button { font-family: inherit; cursor: pointer; transition: all .15s; }

#analyzeBtn {
  background: #6e56ff;
  color: #fff;
  border: none;
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .1px;
}
#analyzeBtn:hover { background: #7b65ff; transform: translateY(-1px); }
#analyzeBtn:active { transform: translateY(0); }
#analyzeBtn:disabled { background: #1e1e28; color: #3e3e52; transform: none; cursor: not-allowed; }

#startDownload {
  background: #22c55e;
  color: #fff;
  border: none;
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  margin: 0;
}
#startDownload:hover { background: #16a34a; transform: translateY(-1px); }
#startDownload:disabled { background: #1e1e28; color: #3e3e52; transform: none; cursor: not-allowed; }

#cancelDownload {
  background: rgba(239,68,68,.12);
  color: #ef4444;
  border: 1px solid rgba(239,68,68,.25);
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  margin: 0;
}
#cancelDownload:hover { background: rgba(239,68,68,.2); }

#deleteCancelledBtn {
  display: block;
  margin: 14px auto 0;
  background: transparent;
  color: #3e3e52;
  border: 1px solid rgba(255,255,255,.08);
  padding: 6px 16px;
  border-radius: 7px;
  font-size: 12px;
}
#deleteCancelledBtn:hover { color: #ef4444; border-color: rgba(239,68,68,.3); }

.center.margin-top {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 18px;
}
.center { text-align: center; }
.margin-top { margin-top: 20px; }

/* クリップ一覧 */
ul { list-style: none; padding: 0; }
#clipList { margin-top: 4px; }

.clipBox {
  background: #1a1a22;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 8px;
  padding: 11px 16px;
  margin-bottom: 7px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color .15s, background .15s;
  font-size: 13px;
  color: #8080a0;
}
.clipBox:hover { border-color: #6e56ff; background: rgba(110,86,255,.08); color: #f0f0f4; }
.clipBox.selected { border-color: #6e56ff; background: rgba(110,86,255,.1); color: #f0f0f4; }
.clipBox.highlight { border-color: #f59e0b; background: rgba(245,158,11,.07); }
body.light-mode .clipBox { background: #f8f8fc; border-color: #e4e4e0; color: #999; }
body.light-mode .clipBox:hover { border-color: #6e56ff; background: rgba(110,86,255,.05); color: #1a1a24; }

/* キュー */
#queueList li {
  background: #1a1a22;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 8px;
  padding: 11px 14px;
  margin-bottom: 7px;
}
body.light-mode #queueList li { background: #f8f8fc; border-color: #e4e4e0; }

.progress-bar {
  background: #1e1e28;
  height: 4px;
  border-radius: 2px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-bar-inner {
  background: #6e56ff;
  width: 0%;
  height: 100%;
  transition: width .4s ease;
}
.status { font-weight: 600; font-size: 12px; margin-bottom: 4px; color: #8080a0; }
.done { color: #22c55e !important; }

.clipTitle {
  font-weight: 500;
  color: #c0c0d8;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 60%;
}

/* モーダル */
#modalOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 20px;
}

#modal {
  background: #16161c;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 16px;
  width: 100%;
  max-width: 760px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 26px;
  box-shadow: 0 32px 80px rgba(0,0,0,.7);
}
body.light-mode #modal { background: #fff; border-color: #e0e0e0; }

#modalHeader {
  margin-bottom: 14px;
  padding-bottom: 13px;
  border-bottom: 1px solid rgba(255,255,255,.07);
}
body.light-mode #modalHeader { border-color: #eee; }
#modalTitleLabel {
  font-size: 15px;
  font-weight: 600;
  color: #f0f0f4;
}
body.light-mode #modalTitleLabel { color: #1a1a24; }

#modal video {
  width: 100%;
  height: auto;
  border-radius: 8px;
  background: #000;
}

#waveform-container {
  width: 100%;
  height: 80px;
  margin: 12px 0;
  background: #0a0a0e;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,.06);
  overflow: hidden;
}

.sliderContainer { margin: 14px 0 8px; }
.sliderLabel {
  font-size: 11px;
  color: #5a5a72;
  margin-bottom: 10px;
  display: block;
  text-transform: uppercase;
  letter-spacing: .5px;
}

#rangeSliderContainer {
  position: relative;
  height: 36px;
  background: #1e1e28;
  border-radius: 8px;
  overflow: hidden;
}
#rangeSliderTrack, #rangeSliderRange {
  position: absolute;
  top: 50%;
  height: 4px;
  background: #6e56ff;
  transform: translateY(-50%);
  border-radius: 2px;
}
#rangeSliderTrack { z-index: 0; }
#rangeSliderRange { z-index: 1; }
#startHandle, #endHandle {
  position: absolute;
  top: 0;
  width: 14px;
  height: 100%;
  background: #6e56ff;
  border-radius: 4px;
  cursor: ew-resize;
  z-index: 2;
  transition: background .15s;
}
#startHandle:hover, #endHandle:hover { background: #7b65ff; }
.dragging { background: #7b65ff !important; }

.timeDisplays {
  display: flex;
  gap: 10px;
  margin: 12px 0;
}
.timeBox {
  background: #1a1a22;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 7px;
  padding: 8px 14px;
  font-size: 12px;
  color: #5a5a72;
  flex: 1;
  text-align: center;
}
.timeBox span { font-weight: 600; color: #c0c0d8; margin-left: 4px; }
.timeBox.bold { color: #a99cff; font-weight: 600; }
body.light-mode .timeBox { background: #f8f8fc; border-color: #e4e4e0; }
body.light-mode .timeBox span { color: #1a1a24; }

#modal input[type="text"] {
  width: 100%;
  margin: 10px 0 0;
  background: #0e0e12;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 7px;
  color: #c0c0d8;
  font-size: 14px;
  padding: 9px 12px;
  outline: none;
}
#modal input[type="text"]:focus {
  border-color: #6e56ff;
  box-shadow: 0 0 0 3px rgba(110,86,255,.2);
}
#modal input[type="text"]::placeholder { color: #3e3e52; }

.modalBtnGroup {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 14px;
}
#queueAddBtn {
  background: #6e56ff;
  color: #fff;
  border: none;
  padding: 9px 20px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
}
#queueAddBtn:hover { background: #7b65ff; }
#cancelModalBtn {
  background: #1e1e28;
  color: #8080a0;
  border: 1px solid rgba(255,255,255,.08);
  padding: 9px 20px;
  border-radius: 7px;
  font-size: 13px;
}
#cancelModalBtn:hover { background: #26262e; color: #c0c0d8; }

/* 詳細モーダル */
.modalOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modalContent {
  background: #16161c;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px;
  padding: 24px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modalContent h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #f0f0f4; }
.modalContent pre { font-size: 12px; color: #8080a0; line-height: 1.7; }
#detailCloseBtn {
  margin-top: 16px;
  background: #1e1e28;
  color: #8080a0;
  border: 1px solid rgba(255,255,255,.08);
  padding: 7px 18px;
  border-radius: 7px;
  font-size: 12px;
}
#detailCloseBtn:hover { background: #26262e; }

h2, h3 { color: #f0f0f4; }
body.light-mode h2, body.light-mode h3 { color: #1a1a24; }
    </style>
  </head>
  <body>
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">
        <h1>解析ツール</h1>
        <button id="themeToggle">ライトモード</button>
      </div>

      <!-- セクション①：ファイル入力 -->
      <div class="section-box">
        <h3 class="section-title"><span class="step-badge">1</span>ファイルを選ぶ</h3>
        <div class="form-row horizontal-files">
          <!-- 動画ファイル -->
          <div class="file-block">
            <label>動画ファイル（mp4）</label>
            <div class="file-line" data-copy-dir="videos">
              <label for="videoFile" class="fileUploadBtn">+ 選択</label>
              <input
                type="file"
                id="videoFile"
                accept="video/*"
                style="display: none"
              />
              <span id="videoInfo" class="file-info">未選択</span>
            </div>
          </div>

          <!-- 💬 チャットファイル -->
          <div class="file-block">
            <label>チャットCSV</label>
            <div class="file-line" data-copy-dir="chats">
              <label for="chatFile" class="fileUploadBtn">+ 選択</label>
              <input
                type="file"
                id="chatFile"
                accept=".csv, text/csv"
                style="display: none"
              />
              <span id="chatInfo" class="file-info">未選択</span>
            </div>
          </div>
        </div>
      </div>

      <!-- セクション②：キーワード・条件入力 -->
      <div class="section-box">
        <h3 class="section-title"><span class="step-badge">2</span>条件を設定</h3>
        <div class="form-row">
          <div class="form-sub">
            <label for="keywordsInput"
              >キーワード（例：「草」「ｗ」など）</label
            >
            <input
              type="text"
              id="keywordsInput"
              placeholder="キーワードを入力してください"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-sub">
            <label for="start_threshold">コメント数（開始）</label>
            <select id="start_threshold" name="start_threshold">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15">15</option>
              <option value="16">16</option>
              <option value="17">17</option>
              <option value="18">18</option>
              <option value="19">19</option>
              <option value="20" selected>20</option>
              <option value="21">21</option>

              <option value="23">23</option>
              <option value="24">24</option>
              <option value="25">25</option>
              <option value="26">26</option>
              <option value="27">27</option>
              <option value="28">28</option>
              <option value="29">29</option>
              <option value="30">30</option>
              <option value="31">31</option>
              <option value="32">32</option>
              <option value="33">33</option>
              <option value="34">34</option>
              <option value="35">35</option>
              <option value="36">36</option>
              <option value="37">37</option>
              <option value="38">38</option>
              <option value="39">39</option>
              <option value="40">40</option>
              <option value="41">41</option>
              <option value="42">42</option>
              <option value="43">43</option>
              <option value="44">44</option>
              <option value="45">45</option>
              <option value="46">46</option>
              <option value="47">47</option>
              <option value="48">48</option>
              <option value="49">49</option>
              <option value="50">50</option>
              <option value="51">51</option>
              <option value="52">52</option>
              <option value="53">53</option>
              <option value="54">54</option>
              <option value="55">55</option>
              <option value="56">56</option>
              <option value="57">57</option>
              <option value="58">58</option>
              <option value="59">59</option>
              <option value="60">60</option>
            </select>
          </div>
          <div class="form-sub">
            <label for="end_threshold">コメント数（終了）</label>
            <select id="end_threshold" name="end_threshold">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>

              <option value="28">28</option>
              <option value="29">29</option>
              <option value="30">30</option>
              <option value="31">31</option>
              <option value="32">32</option>
              <option value="33">33</option>
              <option value="34">34</option>
              <option value="35">35</option>
              <option value="36">36</option>

              <option value="38">38</option>
              <option value="39">39</option>
              <option value="40">40</option>
              <option value="41">41</option>
              <option value="42">42</option>
              <option value="43">43</option>

              <option value="45">45</option>
              <option value="46">46</option>
              <option value="47">47</option>
              <option value="48">48</option>
              <option value="49">49</option>
              <option value="50">50</option>
              <option value="51">51</option>
              <option value="52">52</option>
              <option value="53">53</option>
              <option value="54">54</option>
              <option value="55">55</option>
              <option value="56">56</option>
              <option value="57">57</option>
              <option value="58">58</option>
              <option value="59">59</option>
              <option value="60">60</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-sub">
            <label for="fontSelect">コメントフォント</label>
            <select id="fontSelect">
              <option value="">読み込み中...</option>
            </select>
          </div>
        </div>
      </div>

      <!-- セクション③：解析ボタン -->
      <div class="section-box center">
        <h3 class="section-title"><span class="step-badge">3</span>解析を実行</h3>
        <button id="analyzeBtn" type="button">🔍 解析する</button>
      </div>

      <!-- セクション④：解析結果 -->
      <div class="section-box">
        <h3 class="section-title"><span class="step-badge">4</span>解析結果</h3>
        <ul id="clipList" class="center"></ul>
      </div>

      <div class="section-box">
        <h3 class="section-title"><span class="step-badge">5</span>クリップを保存</h3>

        <!-- キュー一覧 -->
        <ul id="queueList" class="center"></ul>

        <!-- ボタン -->
        <div class="center margin-top">
          <button id="startDownload" type="button">⬇️ 一括生成開始</button>
          <button
            id="cancelDownload"
            type="button"
            class="cancel-btn"
            style="display: none"
          >
            キャンセル
          </button>
        </div>
      </div>

      <!-- モーダル -->
      <div id="modalOverlay">
        <div
          id="modal"

function parseTimeToSeconds(timeStr) {
  if (!timeStr || typeof timeStr !== "string") return 0;
  const parts = timeStr.split(":").map((p) => parseInt(p, 10));
  if (parts.length === 2) {
    const [min, sec] = parts;
    return min * 60 + sec;
  } else if (parts.length === 3) {
    const [hr, min, sec] = parts;
    return hr * 3600 + min * 60 + sec;
  } else {
    return 0;
  }
}

function timeStrToSec(str) {
  const [min, sec] = str.split(":").map(Number);
  return min * 60 + sec;
}

async function fetchWithRetry(url, options = {}, retries = 2, backoff = 2000) {
  for (let i = 0; i <= retries; i++) {
    try {
      const response = await fetch(url, options);
      if (!response.ok)
        throw new Error(`HTTP error! status: ${response.status}`);
      return response;
    } catch (error) {
      if (i === retries) throw error;
      await new Promise((resolve) => setTimeout(resolve, backoff * 2 ** i));
    }
  }
}

        const rawIdx = pData.current_clip;

          for (let i = Math.max(lastClipIdx, 0); i < currentIdx; i++) {
            const clip = pendingClips[i];

              <div class="status done">✅ 完了</div>
              <div><strong>${clip.title}</strong></div>
              <div>${formatTime(clip.startSec)} ～ ${formatTime(clip.endSec)} の時間が取れました</div>

            if (newLi) {
              newLi.innerHTML = `
              <div class="status">⬇️ 処理中 (${currentIdx + 1}/${pendingClips.length})</div>
              <div><strong>${newClip.title}</strong></div>
              <div>${formatTime(newClip.startSec)} ～ ${formatTime(newClip.endSec)} の時間が取れました</div>
              <div class="progress-bar"><div class="progress-bar-inner" style="width:0%"></div></div>
              <div class="progress-text">0%</div>
              `;
            }
          }
          lastClipIdx = currentIdx;
        }

        if (currentIdx >= 0 && currentIdx < pendingClips.length) {
          const clip = pendingClips[currentIdx];
          const li = document.getElementById(`queue-item-${clip.id}`);
          if (li) {
            const bar = li.querySelector(".progress-bar-inner");
            const text = li.querySelector(".progress-text");
            const status = li.querySelector(".status");
            if (bar) bar.style.width = `${percent}%`;
            if (text) text.textContent = `${pData.message || ""} (${percent}%)`;
            if (status) status.textContent = `⬇️ 処理中 (${currentIdx + 1}/${pendingClips.length})`;
          }
        }

        if (pData.all_done) {
          pendingClips.forEach((clip) => {
            if (!completedSet.has(clip.id)) {
              completedIds.push(clip.id);
              completedSet.add(clip.id);
            }
            const li = document.getElementById(`queue-item-${clip.id}`);
            if (li) {
              li.innerHTML = `
              <div class="status done">✅ 完了</div>
              <div><strong>${clip.title}</strong></div>
              <div>${formatTime(clip.startSec)} ～ ${formatTime(clip.endSec)} の時間が取れました</div>
              `;
            }
          });
          break;
        }
      }
    } catch (e) {
      console.error(e);
      queue.forEach((clip) => {
        if (!completedSet.has(clip.id)) {
          const li = document.getElementById(`queue-item-${clip.id}`);
          if (li) {
            li.innerHTML = `
            <div class="status" style="color:red;">❌ 失敗: ${e.message}</div>
            <div><strong>${clip.title}</strong></div>
            <div>${formatTime(clip.startSec)} ～ ${formatTime(clip.endSec)} の時間が取れました</div>
            `;
          }
        }
      });
    }

    if (!downloadCancelled) {
      cancelDownloadBtn.style.display = "none";
      startDownloadBtn.disabled = false;
    }
  });
});

function formatFileName(name, front = 5) {
  const ext = name.split(".").pop();
  const base = name.replace(/\.[^/.]+$/, "");
  if (base.length <= front + 3) return name;
  return base.slice(0, front) + "…" + "." + ext;
}

function formatTime(sec) {
  sec = Math.floor(sec);
  const hours = Math.floor(sec / 3600);
  const minutes = Math.floor((sec % 3600) / 60);
  const seconds = sec % 60;

  if (hours > 0) {
    return `${hours}:${minutes.toString().padStart(2, "0")}:${seconds.toString().padStart(2, "0")}`;
  } else {
    return `${minutes}:${seconds.toString().padStart(2, "0")}`;
  }
}

function updateSliderUI() {
  if (
    typeof sliderMin !== "number" ||
    typeof sliderMax !== "number" ||
    sliderMin >= sliderMax
  ) {
    console.warn("⚠️ sliderMin または sliderMax が無効です", { sliderMin, sliderMax });
    return;
  }

  if (typeof clipStartSec !== "number" || typeof clipEndSec !== "number") {
    console.warn("⚠️ clipStartSec または clipEndSec が未定義です");
    return;
  }

  let adjustedEndSec = clipEndSec;
  if (clipEndSec >= sliderMax) {
    adjustedEndSec = Math.max(sliderMax - 1, sliderMin);
  }

  const totalRange = sliderMax - sliderMin;
  const startPercent = ((clipStartSec - sliderMin) / totalRange) * 100;
  const endPercent = ((adjustedEndSec - sliderMin) / totalRange) * 100;

  const trackEl = track || document.getElementById("rangeSliderTrack");
  const rangeEl = document.getElementById("rangeSliderRange");

  if (!startHandle || !endHandle || !trackEl || !rangeEl) {
    console.warn("⚠️ 必要な要素が見つかりません", { startHandle, endHandle, trackEl, rangeEl });
    return;
  }

  startHandle.style.left = `${startPercent}%`;
  endHandle.style.left = `${endPercent}%`;
  trackEl.style.left = `${startPercent.toFixed(2)}%`;
  trackEl.style.width = `${(endPercent - startPercent).toFixed(2)}%`;
  rangeEl.style.left = `${startPercent.toFixed(2)}%`;
  rangeEl.style.width = `${(endPercent - startPercent).toFixed(2)}%`;

  if (endPercent >= 99.9) {
    endHandle.style.transform = "translateX(-100%)";
  } else {
    endHandle.style.transform = "translateX(-50%)";
  }

  if (startTimeDisplay && endTimeDisplay) {
    startTimeDisplay.textContent = formatTime(clipStartSec);
    endTimeDisplay.textContent = formatTime(clipEndSec);
  } else {
    console.warn("⚠️ startTimeDisplay または endTimeDisplay が未定義です");
  }

  console.log("🔄 updateSliderUI 実行", { clipStartSec, clipEndSec, sliderMin, sliderMax, startPercent, endPercent });
}

function renderClipsList() {
  const clipsList = document.getElementById("clipList");
  clipsList.innerHTML = "";

  clips.forEach((clip) => {
    if (!clip || !clip.id) {
      console.warn("🚫 無効なclipがスキップされました:", clip);
      return;
    }

    clip.startSec =
      typeof clip.start === "number"
        ? clip.start
        : parseTimeToSeconds(String(clip.start || "0").trim());

    clip.endSec =
      typeof clip.end === "number"
        ? clip.end
        : parseTimeToSeconds(String(clip.end || "0").trim());

    if (isNaN(clip.startSec) || clip.startSec < 0) clip.startSec = 0;
    if (isNaN(clip.endSec) || clip.endSec < 0) clip.endSec = clip.startSec;

    if (clip.endSec < clip.startSec) clip.endSec = clip.startSec;

    const li = document.createElement("li");
    li.className = "clipBox";
    li.textContent = `クリップを再生する: ${formatTime(clip.startSec)} ～ ${formatTime(clip.endSec)}`;

    li.addEventListener("click", (e) => {
      currentClip = clip;

      if (!clip || !clip.id) {
        console.warn("❗ 無効なclipクリック:", clip);
        return;
      }

      document.querySelectorAll(".clipBox.selected").forEach((el) => {
        el.classList.remove("selected");
      });

      currentClipElement = e.currentTarget;
      currentClipElement.classList.add("selected");
      currentClipId = clip.id;

      openModal(clip.id, e);

      const video = document.getElementById("videoPlayer");
      if (!video) {
        console.warn("🎥 video要素が見つかりません");
        return;
      }

      video.pause();
      video.currentTime = clip.startSec;

      setTimeout(() => {
        video.muted = true;
        video
          .play()
          .then(() => {
            setTimeout(() => {
              video.muted = false;
            }, 200);
          })
          .catch((e) => {
            console.warn("🎥 再生失敗:", e);
          });

        const interval = setInterval(() => {
          if (video.currentTime >= clip.endSec || video.paused) {
            video.pause();
            clearInterval(interval);
          }
        }, 500);
      }, 500);

      if (!video.hasClickHandler) {
        video.addEventListener("click", () => {
          if (video.paused) {
            video.play();
          } else {
            video.pause();
          }
        });
        video.hasClickHandler = true;
      }
    });

    clipsList.appendChild(li);
  });
}

function startDownload() {
  console.log("🚀 startDownload()呼び出し", new Date().toISOString());
  console.trace("🚀 startDownload()呼び出しトレース");

  if (isDownloading) {
    console.warn("⚠️ すでにダウンロード処理中です。多重送信を防止します。");
    return;
  }

  window.clips = Array.isArray(queue) ? [...queue] : [];
  console.log("✅ startDownload()内のqueue:", JSON.stringify(queue));
  console.log("✅ startDownload()内のwindow.clips:", JSON.stringify(window.clips));

  if (!window.clips.length) {
    console.warn("⚠️ キューが空です。処理を中断します。");
    alert("キューにクリップが追加されていません！");
    return;
  }

  isDownloading = true;

  startDownloadBtn.textContent = "解析中…";
  startDownloadBtn.disabled = true;

  setTimeout(() => {
    if (cancelBtn) {
      cancelBtn.disabled = false;
      console.log("✅ キャンセルボタンを有効化しました");
    }
  }, 10000);

  const clipsJson = JSON.stringify(window.clips);
  console.log("✅ 送信FormData clips JSON:", clipsJson);

  if (!clipsJson || clipsJson === "[]") {
    console.error("❌ 送信するclipsが空です。");
    alert("送信するクリップが設定されていません！");
    resetDownloadUI();
    return;
  }

  const formData = new FormData();
  const videoInput = document.getElementById("videoFile");
  const chatInput = document.getElementById("chatFile");

  if (!videoInput.files[0] || !chatInput.files[0]) {
    console.error("❌ 動画ファイルまたはチャットファイルが未選択です");
    alert("動画ファイルとチャットファイルを選択してください！");
    resetDownloadUI();
    return;
  }

  formData.append("video", videoInput.files[0]);
  formData.append("chat", chatInput.files[0]);
  formData.append("clips", clipsJson);
  const _fontSelect = document.getElementById("fontSelect");
  formData.append("font_name", _fontSelect ? _fontSelect.value : "");

  fetch("/process_clips", { method: "POST", body: formData })
    .then((res) => {
      if (res.status === 429) {
        console.warn("⚠️ サーバー処理中（429）。UIを戻します。");
        resetDownloadUI();
        return Promise.resolve();
      }
      if (!res.ok) {
        console.error("❌ サーバーから不正応答:", res.status);
        resetDownloadUI();
        return;
      }
      return res.json();
    })
    .then((data) => {
      if (!data) return;
      console.log("✅ サーバー応答:", data);

      if (data.success) {
        console.log("✅ ダウンロード処理を開始します（pollProgress）");
        pollProgress(data.progress_path);
      } else {
        console.error("❌ ダウンロード処理が失敗:", data.message || "不明なエラー");
        resetDownloadUI();
      }
    })
    .catch((err) => {
      console.error("❌ ダウンロード処理エラー:", err);
      resetDownloadUI();
    });

  function resetDownloadUI() {
    startDownloadBtn.textContent = "⬇️ 一括生成開始";
    startDownloadBtn.disabled = false;
    isDownloading = false;
  }
}

function pollProgress(progressPath) {
  const interval = setInterval(() => {
    fetch(`/get-progress-file?path=${encodeURIComponent(progressPath)}&t=${Date.now()}`)
      .then((response) => response.json())
      .then((data) => {
        console.log("📘 [進捗データ]:", data);

        if (data.all_done) {
          clearInterval(interval);
          console.log("✅ 全クリップ処理が完了しました");
          onDownloadComplete();
          return;
        }

        if (data.progress >= 100) {
          console.log("✅ このクリップが完了しました（次の処理を待機）");
        }

        if (data.progress === -1) {
          clearInterval(interval);
          console.error("❌ エラーまたはキャンセル:", data.message);
          onDownloadComplete();
        }
      })
      .catch((err) => {
        console.error("❌ 進捗取得エラー:", err);
        clearInterval(interval);
        onDownloadComplete();
      });
  }, 1000);
}

function formatVideoFileName(fileName) {
  const extIndex = fileName.lastIndexOf(".");
  const ext = fileName.slice(extIndex);
  const namePart = fileName.slice(0, extIndex);

  if (namePart.length > 20) {
    return namePart.slice(0, 7) + "…" + namePart.slice(-7) + ext;
  } else {
    return fileName;
  }
}

async function openModal(id, event) {
  const clip = clips.find((c) => c.id === id);
  if (!clip) return;

  currentClipId = id;

  if (currentClipElement) {
    currentClipElement.classList.remove("highlight");
    currentClipElement = null;
  }

  currentClipElement =
    event?.currentTarget ?? document.getElementById(`clip-${id}`);

  if (clip.title.trim() === "") {
    modalTitleInput.value = "";
    modalTitleInput.placeholder = "ここにタイトルを入力してください";
  } else {
    modalTitleInput.value = clip.title;
    modalTitleInput.placeholder = "";
  }

  videoPlayer.onloadedmetadata = null;

  if (videoPath) {
    videoURL = URL.createObjectURL(videoPath);
    videoPlayer.src = videoURL;
    videoPlayer.muted = false;
  }

  videoPlayer.onloadedmetadata = async () => {
    videoPlayer.onloadedmetadata = null;

    maxSec = Math.floor(videoPlayer.duration);
    const bufferSec = 600;

    const playStartSec = Math.max(clip.startSec - bufferSec, 0);
    let playEndSec = Math.min(clip.endSec + bufferSec, maxSec);

    if (playEndSec <= playStartSec) {
      playEndSec = Math.min(playStartSec + 10, maxSec);
    }

    sliderMin = playStartSec;
    sliderMax = playEndSec;

    clipStartSec = Math.max(sliderMin, Math.min(clip.startSec, sliderMax - 1));
    clipEndSec = Math.max(sliderMin + 1, Math.min(clip.endSec, sliderMax));

    updateSliderUI();
    updateClipDurationDisplay();

    videoPlayer.currentTime = clipStartSec;

    setTimeout(async () => {
      if (videoPath?.name) {
        const fileName = videoPath.name;
        const folderName = fileName.replace(/\.[^/.]+$/, "");
        const jsonUrl = `/downloads/${folderName}/waveform.json`;

        console.log("📊 attachWaveform呼び出し:", jsonUrl, clipStartSec, clipEndSec);
        try {
          await attachWaveform(jsonUrl, clipStartSec, clipEndSec);
        } catch (err) {
          console.error("❌ attachWaveform 失敗:", err);
        }
      }
    }, 100);
  };

  modalOverlay.style.display = "flex";
  resetQueueAddButtonState();
}

const WAVEFORM_VIEW_DURATION = 30;

async function attachWaveform(jsonUrl, clipStart, clipEnd) {
  const video = document.getElementById("videoPlayer");
  if (peaksInstance) {
    peaksInstance.destroy();
    document.getElementById("waveform-container").innerHTML = "";
  }

  const options = {
    containers: {
      zoomview: document.getElementById("waveform-container"),
    },
    mediaElement: video,
    dataUri: {
      json: jsonUrl,
    },
    zoomWaveformColor: "#2196f3",
    overviewWaveformColor: "#2196f3",
    zoomLevels: [256, 512, 1024, 2048, 4096],
  };

  return new Promise((resolve, reject) => {
    window.peaks.init(options, (err, instance) => {
      if (err) {
        console.error("❌ Peaks.js 初期化エラー:", err);
        reject(err);
        return;
      }
      peaksInstance = instance;

      peaksInstance.segments.add({
        id: "clipSegment",
        startTime: clipStart,
        endTime: clipEnd,
        labelText: "Clip",
        color: "rgba(255, 0, 0, 0.4)",
      });

      const zoomview = peaksInstance.views.getView("zoomview");
      if (zoomview) {
        try {
          zoomview.setZoom({ seconds: WAVEFORM_VIEW_DURATION });
          const viewStart = Math.max(clipStart - WAVEFORM_VIEW_DURATION / 2, 0);
          zoomview.setStartTime(viewStart);
          console.log("🔍 波形ビュー: 5分表示, 開始位置:", viewStart);
        } catch (err) {
          console.warn("⚠️ 波形ズーム設定エラー:", err);
        }
      }

      console.log("✅ Peaks.js 波形初期化完了");
      resolve(peaksInstance);
    });
  });
}

let isDragging = false;
let originalClipStartSec = 0;
let originalClipEndSec = 0;

function onDragStart(e) {
  if (!e) {
    console.warn("⚠️ イベントが渡されていません");
    return;
  }

  if (e.cancelable) {
    e.preventDefault();
  }

  const target = e.touches?.[0]?.target || e.target;
  if (!target) {
    console.warn("⚠️ dragTarget が取得できませんでした");
    return;
  }

  dragTarget = target;
  dragTarget.classList.add("dragging");
  isDragging = true;

  if (videoPlayer) {
    videoPlayer.pause();
  }

  originalClipStartSec = clipStartSec;
  originalClipEndSec = clipEndSec;

  if (dragTarget.id === "startHandle") {
    if (peaksInstance && peaksInstance.player) {
      try {
        peaksInstance.player.seek(clipStartSec);
      } catch (err) {
        console.warn("⚠️ player.seekエラー:", err);
      }
    }
    if (peaksInstance) {
      try {
        const zoomview = peaksInstance.views.getView("zoomview");
        if (zoomview && typeof zoomview.setStartTime === "function") {
          const waveStart = Math.max(clipStartSec - WAVEFORM_VIEW_DURATION / 2, 0);
          zoomview.setStartTime(waveStart);
        }
      } catch (err) {
        console.warn("⚠️ 波形スクロールエラー:", err);
      }
    }
  }

  document.removeEventListener("mousemove", onDragMove);
  document.removeEventListener("mouseup", onDragEnd);
  document.removeEventListener("touchmove", onDragMove);
  document.removeEventListener("touchend", onDragEnd);

  document.addEventListener("mousemove", onDragMove);
  document.addEventListener("mouseup", onDragEnd);
  document.addEventListener("touchmove", onDragMove, { passive: false });
  document.addEventListener("touchend", onDragEnd);

  console.log("🎯 onDragStart:", dragTarget.id);
}

function onDragMove(e) {
  if (!dragTarget) {
    return;
  }

  if (
    typeof sliderMin !== "number" ||
    typeof sliderMax !== "number" ||
    sliderMin >= sliderMax
  ) {
    return;
  }

  const rect = sliderContainer?.getBoundingClientRect?.();
  if (!rect || rect.width === 0) {
    return;
  }

  if (e.cancelable) {
    e.preventDefault();
  }

  const clientX = e.touches?.[0]?.clientX ?? e.clientX;
  let percent = (clientX - rect.left) / rect.width;
  percent = Math.min(Math.max(percent, 0), 1);

  let time = sliderMin + percent * (sliderMax - sliderMin);
  time = Math.round(time * 10) / 10;

  if (dragTarget.id === "startHandle") {
    clipStartSec = Math.min(time, clipEndSec - 0.5);
    clipStartSec = Math.max(clipStartSec, sliderMin);
    if (peaksInstance && peaksInstance.player) {
      try {
        peaksInstance.player.seek(clipStartSec);
      } catch (err) {}
    }
  } else if (dragTarget.id === "endHandle") {
    clipEndSec = Math.max(time, clipStartSec + 0.5);
    clipEndSec = Math.min(clipEndSec, sliderMax);
  }

  updateSliderUI();
  updateClipDurationDisplay();
  updateWaveformSegment();
  scrollWaveformIfNeeded(time);
}

function onDragEnd(e) {
  if (!dragTarget) {
    return;
  }

  const handleId = dragTarget.id;

  dragTarget.classList.remove("dragging");
  dragTarget = null;
  isDragging = false;

  document.removeEventListener("mousemove", onDragMove);
  document.removeEventListener("mouseup", onDragEnd);
  document.removeEventListener("touchmove", onDragMove);
  document.removeEventListener("touchend", onDragEnd);

  if (videoPlayer) {
    if (handleId === "startHandle") {
      videoPlayer.currentTime = clipStartSec;
      videoPlayer.play();
    } else if (handleId === "endHandle") {
      videoPlayer.play();
    }
  }

  console.log("🎯 onDragEnd:", handleId, "start:", clipStartSec, "end:", clipEndSec);
}

function updateWaveformSegment() {
  if (!peaksInstance) return;

  try {
    const segment = peaksInstance.segments.getSegment("clipSegment");
    if (segment) {
      segment.update({ startTime: clipStartSec, endTime: clipEndSec });
    }
  } catch (err) {
    try {
      peaksInstance.segments.removeAll();
      peaksInstance.segments.add({
        id: "clipSegment",
        startTime: clipStartSec,
        endTime: clipEndSec,
        labelText: "Clip",
        color: "rgba(255, 0, 0, 0.4)",
      });
    } catch (e) {
      console.warn("⚠️ 波形セグメント更新エラー:", e);
    }
  }
}

function scrollWaveformIfNeeded(currentTime) {
  if (!peaksInstance) return;

  try {
    const zoomview = peaksInstance.views.getView("zoomview");
    if (!zoomview) return;

    const viewStart = zoomview.getStartTime();
    const viewEnd = viewStart + WAVEFORM_VIEW_DURATION;

    if (currentTime < viewStart) {
      const newStart = Math.max(currentTime - WAVEFORM_VIEW_DURATION * 0.1, 0);
      zoomview.setStartTime(newStart);
      console.log("⬅️ 波形を前へ:", newStart);
    } else if (currentTime > viewEnd) {
      const newStart = currentTime - WAVEFORM_VIEW_DURATION * 0.9;
      zoomview.setStartTime(newStart);
      console.log("➡️ 波形を次へ:", newStart);
    }
  } catch (err) {
    console.warn("⚠️ 波形スクロールエラー:", err);
  }
}
